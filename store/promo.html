<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notion Equation promo tile</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 440px; height: 280px; margin: 0; overflow: hidden; }
    body {
      display: grid;
      place-items: center;
      color: #fffdf8;
      background:
        radial-gradient(circle at 82% 22%, rgb(215 172 80 / 28%), transparent 34%),
        linear-gradient(145deg, #2d2b27 0%, #171715 100%);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      display: flex;
      width: 360px;
      align-items: center;
      gap: 25px;
    }
    img { width: 96px; height: 96px; filter: drop-shadow(0 14px 30px rgb(0 0 0 / 30%)); }
    h1 { margin: 0; font-size: 30px; line-height: 1.05; letter-spacing: -0.04em; }
    p { margin: 12px 0 0; color: #d8d3ca; font-size: 15px; line-height: 1.45; }
    strong { color: #e2b85c; font-weight: 650; }
  </style>
</head>
<body>
  <main>
    <img src="../icons/icon-128.png" alt="">
    <div>
      <h1>Notion<br>Equation</h1>
      <p><strong>LaTeX in.</strong><br>Native Notion math out.</p>
    </div>
  </main>
</body>
</html>
